name: Manual CI/CD MLOps

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Choisir le service à build"
        required: true
        type: choice
        options:
          - api
          - ui

jobs:

  build-api:
    if: ${{ github.event.inputs.service == 'api' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r api/requirements.txt

      - name: Train model
        run: python model/train.py

      - name: Verify model exists
        run: test -f model/model.joblib

      - name: Test API import
        run: python -c "from api.main import app; print(app.title)"

      - name: Build API Docker image
        run: docker build -t mlops-logement-api -f api/Dockerfile .

  build-ui:
    if: ${{ github.event.inputs.service == 'ui' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build UI Docker image
        run: docker build -t mlops-logement-ui -f ui/Dockerfile .