services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: mlops_logement_api
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    container_name: mlops_logement_ui
    environment:
      API_URL: http://api:8000/predict
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy
